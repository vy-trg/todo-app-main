<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css" />
  <title>Frontend Mentor | Todo app</title>
</head>

<body>
  <div class="bg-header"></div>

  <main>
    <div class="container">
      <header>
        <h1>T O D O</h1>
        <button id="theme-toggle">
          <img src="./images/icon-moon.svg" alt="Toggle theme" />
        </button>
      </header>

      <div class="input-row">
        <span class="circle"></span>
        <input type="text" id="todo-input" placeholder="Create a new todo..." aria-label="Create a new todo" />
      </div>

      <div class="todo-list-wrapper">
        <ul id="todo-list"></ul>
        <div class="list-footer">
          <span id="items-left">0 items left</span>
          <div class="filters desktop-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
          </div>
          <button id="clear-completed">Clear Completed</button>
        </div>
      </div>

      <div class="filters mobile-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <p class="drag-hint">Drag and drop to reorder list</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>

</html>
